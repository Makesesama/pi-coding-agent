name: GUI Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Fake-backed GUI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install Emacs 31 with X11 support
        run: nix profile install nixpkgs#emacs31
      - name: Install virtual framebuffer
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install tree-sitter grammars
        run: emacs --batch -Q -L . -l scripts/install-ts-grammars.el
      - name: Run deterministic GUI tests
        run: make test-gui-ci
